<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uptimizr — Live Demo · Analytics for 3D scenes, in your browser</title>
    <meta
      name="description"
      content="A fully in-browser demo of Uptimizr: interact with a 3D scene and watch the analytics dashboard update live — view-direction & click heatmaps, mesh interactions, performance, and session replay. No backend, nothing leaves your browser."
    />

    <!-- Canonical demo URL; the project's home for docs & downloads is www.uptimizr.com. -->
    <link rel="canonical" href="https://demo.uptimizr.com/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Icons & PWA manifest (PNGs generated by docs/design/gen-og-demo.mjs). -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0b0d12" />

    <!-- Open Graph (link previews on Slack, Discord, LinkedIn, Facebook, iMessage). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Uptimizr" />
    <meta property="og:title" content="Uptimizr — Live Demo · Analytics for 3D scenes" />
    <meta
      property="og:description"
      content="Interact with a 3D scene and watch the analytics dashboard update live — heatmaps, mesh interactions, performance, and session replay. Runs entirely in your browser; nothing leaves your device."
    />
    <meta property="og:url" content="https://demo.uptimizr.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://demo.uptimizr.com/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Uptimizr live demo — analytics for 3D scenes, running in your browser"
    />

    <!-- Twitter / X card. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Uptimizr — Live Demo · Analytics for 3D scenes" />
    <meta
      name="twitter:description"
      content="Interact with a 3D scene and watch the analytics dashboard update live. Runs entirely in your browser; nothing leaves your device."
    />
    <meta name="twitter:image" content="https://demo.uptimizr.com/og.png" />
    <meta
      name="twitter:image:alt"
      content="Uptimizr live demo — analytics for 3D scenes, running in your browser"
    />

    <!-- Structured data: a free, web-based developer tool that is part of Uptimizr. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Uptimizr Live Demo",
        "url": "https://demo.uptimizr.com/",
        "description": "A fully in-browser demo of Uptimizr: interact with a 3D scene and watch the analytics dashboard update live. No backend, nothing leaves your browser.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "browserRequirements": "Requires a modern browser with WebGL/WebGPU and WebAssembly.",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "license": "https://www.apache.org/licenses/LICENSE-2.0",
        "image": "https://demo.uptimizr.com/og.png",
        "isPartOf": { "@type": "WebSite", "name": "Uptimizr", "url": "https://www.uptimizr.com" },
        "sameAs": ["https://www.uptimizr.com", "https://github.com/RaananW/Uptimizr"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div
        style="
          max-width: 40rem;
          margin: 4rem auto;
          padding: 0 1.5rem;
          font-family: system-ui, sans-serif;
          color: #e2e8f0;
        "
      >
        <h1>Uptimizr — Live Demo</h1>
        <p>
          This in-browser demo of Uptimizr needs JavaScript to run the 3D scene and the live
          analytics dashboard. Please enable JavaScript, or learn more and self-host the open-source
          collector at
          <a href="https://www.uptimizr.com" style="color: #60a5fa">www.uptimizr.com</a>.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
