# pnpm workspace definition.
packages:
  - "oss/apps/*"
  - "oss/packages/*"
  - "examples/*"

# Dependencies whose install/build scripts are allowed to run (pnpm blocks them by
# default). esbuild ships a platform binary required by vitest; sharp ships native
# image-processing binaries used by Next.js. Using the `allowBuilds` map (pnpm 11+)
# so the approval is persisted in committed config and fresh checkouts / git
# worktrees install non-interactively without an `approve-builds` prompt.
allowBuilds:
  canvas: true
  esbuild: true
  sharp: true

minimumReleaseAgeExclude:
  - "@babylonjs/core@9.13.0"
  - "@babylonjs/lite@1.2.0"

# Force patched versions of transitive (build/dev-time) dependencies pulled in by
# Astro tooling and Next.js that lag behind their security advisories. These are
# not direct deps, so they can only be bumped via overrides. Revisit/remove each
# entry once the parent package ships a release that resolves the advisory.
#
# REVIEW PERIODICALLY (e.g. each release, or quarterly): every override is tech
# debt — it pins a version the dependency tree did not choose, so it can silently
# hold back upstream fixes or, as the read-yaml-file case showed, force an
# incompatible major into a transitive dep. For each entry below, check whether
# the parent has since shipped a fix and the override is still needed:
#   1. Temporarily comment the entry out and run `pnpm install`.
#   2. Run `pnpm audit` (advisory cleared upstream?) and `pnpm -r build && pnpm test`.
#   3. If audit stays clean and nothing breaks, delete the entry for good.
# Keep this list as small as possible; remove anything no longer required.
overrides:
  # GHSA: stack overflow via deeply nested YAML (yaml < 2.8.3), via @astrojs/check.
  yaml: ">=2.8.3"
  # GHSA: XSS via unescaped </style> in CSS stringify (postcss < 8.5.10), via next.
  postcss: ">=8.5.10"
  # GHSA: dev-server arbitrary file read on Windows (esbuild < 0.28.1), via astro.
  esbuild: ">=0.28.1"
  # GHSA-h67p-54hq-rp68: quadratic-complexity DoS via merge keys (js-yaml <= 4.1.1),
  # via @changesets/cli (release tooling, dev-only).
  js-yaml: ">=4.2.0"
  # @changesets/cli pulls read-yaml-file@1.1.0, which calls the `yaml.safeLoad` API
  # that js-yaml 4 removed — so the js-yaml override above breaks `changeset version`.
  # read-yaml-file@2.1.0 is the fix: still CJS (changesets `require()`s it) but built
  # against js-yaml ^4 (uses `yaml.load`). 3.x is ESM-only (Node 22 pure ESM) and would
  # break changesets' CommonJS require. Keep this pinned to the 2.x line.
  read-yaml-file: ^2.1.0
