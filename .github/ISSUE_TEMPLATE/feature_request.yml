name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what is getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Include rough API or UX if relevant.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - schema
        - sdk-core
        - sdk-babylon
        - replay
        - heatmap
        - collector-server
        - dashboard
        - db
        - docs / other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
