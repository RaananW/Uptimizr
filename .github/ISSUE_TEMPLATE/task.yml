name: Task
description: A discrete, actionable unit of planned work (often linked to a docs/ section).
labels: ["task"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs to be done, stated as a concrete outcome.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / links
      description: Link the relevant ADR, phase doc, or design sketch this task derives from.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How we know this is done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
