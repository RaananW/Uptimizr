name: CodeQL

on:
  # Auto-triggers are disabled while the repo is private (CodeQL code scanning
  # only surfaces results under Security for public repos on the Free plan).
  # Re-enable when going public by uncommenting the pull_request / push / schedule triggers.
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [main]
  # schedule:
  #   - cron: "27 4 * * 1" # weekly, Monday 04:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
