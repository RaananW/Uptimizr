name: main

on:
  # Auto-triggers are disabled while the repo is private (conserve Actions minutes).
  # Re-enable when going public by uncommenting the push trigger below.
  workflow_dispatch:
  # push:
  #   branches: [main]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Audit (production deps, high+)
        run: pnpm audit --prod --audit-level=high

      - name: Scrub gate
        run: bash scripts/scrub-gate.sh
