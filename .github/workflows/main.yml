name: main

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Format, audit, license, scrub
    runs-on: ubuntu-latest
    # Build-independent gates run as a fast, fail-first job alongside the build
    # job (Turbo's lint/typecheck/test `dependsOn: ["^build"]`; these don't).
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Audit (production deps, high+)
        run: pnpm audit --prod --audit-level=high

      - name: License compliance
        run: pnpm license-check

      - name: Scrub gate
        run: bash scripts/scrub-gate.sh

  build:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    # Lint, typecheck, and test all `dependsOn: ["^build"]`, so a single job lets
    # Turbo build the graph once and reuse its cache across all four tasks.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      # One Turbo invocation lets the scheduler interleave lint/typecheck/build/
      # test across the package graph (respecting `dependsOn: ["^build"]`) instead
      # of finishing every package's lint before any typecheck starts.
      - name: Lint, typecheck, build, test
        run: pnpm turbo run lint typecheck build test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Drives the real browser → SDK → collector (DuckDB) → dashboard/replay round
    # trip. Hermetic: the Playwright webServers boot the collector, playground, and
    # dashboard with inline env, so no Docker or repo `.env` is required.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Build workspace packages
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm --filter @uptimizr/example-playground test:e2e:install

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            examples/playground/playwright-report
            examples/playground/test-results
          if-no-files-found: ignore
          retention-days: 7
