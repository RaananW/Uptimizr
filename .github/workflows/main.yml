name: main

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Format, audit, license, scrub
    runs-on: ubuntu-latest
    # Build-independent gates run as a fast, fail-first job alongside the build
    # job (Turbo's lint/typecheck/test `dependsOn: ["^build"]`; these don't).
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Audit (production deps, high+)
        run: pnpm audit --prod --audit-level=high

      - name: License compliance
        run: pnpm license-check

      - name: Scrub gate
        run: bash scripts/scrub-gate.sh

  build:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    # Lint, typecheck, and test all `dependsOn: ["^build"]`, so a single job lets
    # Turbo build the graph once and reuse its cache across all four tasks.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
