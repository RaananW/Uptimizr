name: PR

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Format, audit, license
    runs-on: ubuntu-latest
    # These checks don't need the build graph (Turbo's lint/typecheck/test all
    # `dependsOn: ["^build"]`, but format/audit/license-check don't), so they run
    # as a fast, fail-first job alongside the heavier build job.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Audit (production deps, high+)
        run: pnpm audit --prod --audit-level=high

      - name: License compliance
        run: pnpm license-check

  build:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    # Lint, typecheck, and test all `dependsOn: ["^build"]`, so keeping them in a
    # single job lets Turbo build the dependency graph once and reuse its cache
    # across all four tasks. Splitting them would rebuild the graph per runner.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      # Kept as separate, ordered steps. A single `turbo run lint typecheck build
      # test` raises concurrency enough to race the demo's nested playground build
      # against its connector builds (and collides two Next builds); the staged
      # order keeps Turbo's topological build deterministic. The Turbo cache above
      # still skips unchanged packages, which is where the real speedup comes from.
      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Drives the real browser → SDK → collector (DuckDB) → dashboard/replay round
    # trip. Hermetic: the Playwright webServers boot the collector, playground, and
    # dashboard with inline env, so no Docker or repo `.env` is required.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Build workspace packages
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm --filter @uptimizr/example-playground test:e2e:install

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            examples/playground/playwright-report
            examples/playground/test-results
          if-no-files-found: ignore
          retention-days: 7

  changeset:
    name: Changeset present
    runs-on: ubuntu-latest
    # Every PR must declare its release impact with a changeset. Contributors run
    # `pnpm changeset` (or `pnpm changeset --empty` for changes that need no
    # release note). Skipped for the bot's Version Packages PR, which has no
    # changesets by design.
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require a changeset
        run: |
          base="origin/${{ github.base_ref }}"
          added=$(git diff --name-only --diff-filter=AM "$base"...HEAD -- .changeset \
            | grep -E '\.changeset/.*\.md$' | grep -v 'README\.md' || true)
          if [ -z "$added" ]; then
            echo "::error::No changeset found. Run 'pnpm changeset' to describe this change (or 'pnpm changeset --empty' if it needs no release note)."
            exit 1
          fi
          echo "Found changeset(s):"
          echo "$added"

  scrub-gate:
    name: Scrub gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Fail on forbidden tokens
        run: bash scripts/scrub-gate.sh

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan history for secrets
        run: |
          # On a PR, scan only the commits the PR adds (base..HEAD) instead of the
          # entire history every run. Other event types (merge_group,
          # workflow_dispatch) fall back to a full `--all` scan.
          base_sha="${{ github.event.pull_request.base.sha }}"
          if [ -n "$base_sha" ]; then
            echo "Scanning PR range ${base_sha}..HEAD"
            gitleaks detect --source . --log-opts="${base_sha}..HEAD" --redact --no-banner -v
          else
            echo "Scanning full history"
            gitleaks detect --source . --log-opts="--all" --redact --no-banner -v
          fi
