name: PR

on:
  # Auto-triggers are disabled while the repo is private (conserve Actions minutes).
  # Re-enable when going public by uncommenting the pull_request / merge_group triggers.
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  # merge_group:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  scrub-gate:
    name: Proprietary-hosted scrub gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on forbidden hosted-product tokens
        run: bash scripts/scrub-gate.sh
