name: PR

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Format, audit, license
    runs-on: ubuntu-latest
    # These checks don't need the build graph (Turbo's lint/typecheck/test all
    # `dependsOn: ["^build"]`, but format/audit/license-check don't), so they run
    # as a fast, fail-first job alongside the heavier build job.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Audit (production deps, high+)
        run: pnpm audit --prod --audit-level=high

      - name: License compliance
        run: pnpm license-check

  build:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    # Lint, typecheck, and test all `dependsOn: ["^build"]`, so keeping them in a
    # single job lets Turbo build the dependency graph once and reuse its cache
    # across all four tasks. Splitting them would rebuild the graph per runner.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  scrub-gate:
    name: Scrub gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Fail on forbidden tokens
        run: bash scripts/scrub-gate.sh

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full history for secrets
        run: gitleaks detect --source . --log-opts="--all" --redact --no-banner -v
