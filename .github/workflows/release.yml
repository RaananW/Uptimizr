name: Release

# Manual, semver-oriented publish (Changesets). Never auto-publishes on push.
# Defaults to a dry run so the publish set can be validated before the first
# real release. Set `dry-run` to false to actually publish to npm.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Validate the publish set without publishing (changeset publish --dry-run)"
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the version-bump commit + git tags
  id-token: write # npm provenance (OIDC)

jobs:
  release:
    name: Version & publish (Changesets)
    runs-on: ubuntu-latest
    # Real publishes (dry-run = false) must pass through the protected
    # "npm-production" environment (required reviewer + environment-scoped
    # secrets). Dry runs evaluate to an empty name and skip the gate.
    environment: ${{ !inputs.dry-run && 'npm-production' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Scrub gate
        run: bash scripts/scrub-gate.sh

      - name: Apply version bumps
        run: pnpm changeset version

      - name: Publish set (dry run)
        if: ${{ inputs.dry-run }}
        # Changesets' `publish` has no `--dry-run` flag. Preview the exact set
        # the real publish would push using pnpm's dry run: it skips private
        # packages, and we exclude `create-uptimizr` (published manually,
        # matching the changeset `ignore`). No registry writes happen.
        run: pnpm --recursive --filter='!create-uptimizr' publish --dry-run --no-git-checks

      - name: Commit version bump
        if: ${{ !inputs.dry-run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore(release): version packages"

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        env:
          # NPM_TOKEN is an environment-scoped secret on `npm-production`, so it
          # is only injected after the required reviewer approves this run. It is
          # never available to dry runs or any other workflow.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        # We publish with pnpm (not `changeset publish`) so we can exclude the
        # unscoped `create-uptimizr` — it lives outside the `@uptimizr` scope, is
        # released manually, and including it crashes the whole batch when the
        # scoped NPM_TOKEN can't publish it. pnpm skips packages whose version is
        # already on the registry, so this is safe to re-run after a partial
        # publish. `changeset tag` then creates the `pkg@version` git tags.
        run: |
          pnpm --recursive --filter='!create-uptimizr' publish --no-git-checks
          pnpm changeset tag
          git push --follow-tags
